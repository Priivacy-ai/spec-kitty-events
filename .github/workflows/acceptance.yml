name: Acceptance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      candidate_package:
        description: Optional candidate package under verification
        required: false
        default: ""
        type: string
      candidate_version:
        description: Optional candidate version under verification
        required: false
        default: ""
        type: string
      candidate_source:
        description: Optional candidate source descriptor
        required: false
        default: ""
        type: string
      candidate_ref:
        description: Optional candidate git ref or artifact identifier
        required: false
        default: ""
        type: string
      verification_profile:
        description: Verification profile name
        required: false
        default: default
        type: string
  workflow_call:
    inputs:
      candidate_package:
        required: false
        type: string
        default: ""
      candidate_version:
        required: false
        type: string
        default: ""
      candidate_source:
        required: false
        type: string
        default: ""
      candidate_ref:
        required: false
        type: string
        default: ""
      verification_profile:
        required: false
        type: string
        default: default

concurrency:
  group: acceptance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,conformance]" build

      - name: Run pytest
        run: pytest --cov --cov-report=xml

      - name: Run mypy
        run: mypy src/spec_kitty_events --strict

      - name: Build package artifacts
        run: python -m build --sdist --wheel
