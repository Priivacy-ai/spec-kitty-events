schema_version: 1.0.0
mission: software-dev
profile: comprehensive
answers:
  project_intent: >-
    Publish canonical event envelopes, conformance fixtures, and compatibility
    rules consumed by Spec Kitty systems.
  languages_frameworks: >-
    Python 3.10+ with Pydantic event models, committed JSON Schemas, and
    conformance fixtures as part of the public contract.
  testing_requirements: >-
    Use pytest, hypothesis, schema drift checks, and conformance fixture
    validation for any event contract change.
  quality_gates: >-
    pytest, committed schema generation checks, and mypy --strict must pass
    before merge.
  review_policy: >-
    Any change to event envelopes, payload fields, schema versioning, or
    conformance fixtures requires deliberate compatibility review.
  performance_targets: >-
    Validation and replay helpers should stay deterministic and efficient for
    normal CLI and SaaS event volumes.
  deployment_constraints: >-
    Package must ship as a Python library with committed schemas and fixtures;
    live consumers rely on fail-closed compatibility behavior.
  documentation_policy: >-
    Update README, compatibility notes, and shipped fixtures whenever an event
    contract or conformance rule changes.
  risk_boundaries: >-
    Do not add silent compatibility aliases or mutate canonical event fields on
    live paths without an explicit cutover decision.
  amendment_process: >-
    Update the charter through pull request review by maintainers when governance
    or compatibility rules change.
  exception_policy: >-
    Exceptions require explicit maintainer approval plus a documented follow-up to
    restore the standard path.
selected_paradigms: []
selected_directives: []
available_tools:
  - git
  - spec-kitty
